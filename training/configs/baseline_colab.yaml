# Baseline: L1 loss, no channel attention
exp_name: baseline-L1
gt_source: cnmf
zip_dir: /content/drive/Shareddrives/HyperResData/EMIT_S-2_Matches/2026-04-02/zips_cnmf
out_dir: /content/drive/Shareddrives/HyperResData/EMIT_S-2_Matches/experiments

seed: 42
num_bands: 32
scale: 6
gt_size: 96
batch_size: 64
num_workers: 4
max_aois: null

num_feat: 196
num_block: 24
num_grow_ch: 32
channel_attention: false

lr: 0.0002
betas: [0.9, 0.99]
milestones: [30000, 80000, 150000, 250000, 400000]
gamma: 0.5
total_iter: 100000
grad_clip: 5.0
ema_decay: 0.999

loss:
  pixel:
    type: L1
    weight: 1.0

val_freq: 2500
vis_freq: 5000
save_freq: 5000
print_freq: 100
n_vis: 4
vis_bands: [10, 6, 2]

wandb:
  project: EMIT-S2-SuperResolution
  entity: null

abort_on_nan: true
abort_psnr_floor: 25.0
