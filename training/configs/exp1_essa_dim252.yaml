# Exp 1 — Architecture comparison: ESSAformer dim=252 (13.6M params)
# LR 1e-4 per Zhang et al. ICCV 2023, Implementation Details:
#   "We set the initial learning rate to 1e-4 and gradually decreased it to 1e-5"
# dim must be divisible by 36 for 6x PixelUnshuffle.
exp_name: exp1-essa-dim252
model_type: essaformer
gt_source: cnmf
zip_dir: /content/data/zips_cnmf_patched
zip_dir_full: /content/data/zips_cnmf_npy
out_dir: /content/drive/Shareddrives/HyperResData/EMIT_S-2_Matches/experiments
split_json: /content/drive/Shareddrives/HyperResData/EMIT_S-2_Matches/2026-04-02/aoi_split.json

seed: 42
num_bands: 32
scale: 6
gt_size: 192
batch_size: 24
num_workers: 4
max_aois: null
amp: false

dim: 252

lr: 0.0001
betas: [0.9, 0.99]
milestones: [15_000, 30_000, 45_000, 60_000, 75_000]
gamma: 0.5
total_iter: 100_000
grad_clip: 5.0
ema_decay: 0.999

loss:
  pixel:
    type: L1
    weight: 1.0

val_freq: 2500
vis_freq: 5000
save_freq: 5000
print_freq: 100
n_vis: 4
vis_bands: [10, 6, 2]

wandb:
  project: EMIT-S2-SuperResolution
  entity: null

abort_on_nan: true
abort_psnr_floor: 25.0
