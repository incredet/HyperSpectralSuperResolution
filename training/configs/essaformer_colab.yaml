# ESSAformer: ESSA transformer for hyperspectral SHSR (ICCV 2023) — Colab A100
# dim must be divisible by 36 for 6x PixelUnshuffle
exp_name: essaformer-L1
model_type: essaformer
gt_source: cnmf
zip_dir: /content/data/zips_cnmf_patched
out_dir: /content/drive/Shareddrives/HyperResData/EMIT_S-2_Matches/experiments

seed: 42
num_bands: 32
scale: 6
gt_size: 96
batch_size: 64
num_workers: 4
max_aois: null
amp: false

# ESSAformer params
dim: 252

lr: 0.0002
betas: [0.9, 0.99]
milestones: [80000, 150000, 250000, 400000]
gamma: 0.5
total_iter: 100000
grad_clip: 5.0
ema_decay: 0.999

loss:
  pixel:
    type: L1
    weight: 1.0

val_freq: 2500
vis_freq: 5000
save_freq: 5000
print_freq: 100
n_vis: 4
vis_bands: [10, 6, 2]

wandb:
  project: EMIT-S2-SuperResolution
  entity: null

abort_on_nan: true
abort_psnr_floor: 25.0
