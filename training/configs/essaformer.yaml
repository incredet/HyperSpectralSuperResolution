# ESSAformer: ESSA transformer for hyperspectral SHSR (ICCV 2023)
# Polynomial spectral-spatial attention, PixelShuffle 2x->3x upsampling
exp_name: essaformer-L1
model_type: essaformer
gt_source: cnmf
zip_dir: /path/to/zips_cnmf
out_dir: ./experiments

seed: 42
num_bands: 32
scale: 6
gt_size: 192
batch_size: 16
num_workers: 4
max_aois: null

# ESSAformer params — dim must be divisible by 36 for 6x PixelUnshuffle
dim: 252

lr: 0.0002
betas: [0.9, 0.99]
milestones: [80000, 150000, 250000, 400000]
gamma: 0.5
total_iter: 500000
grad_clip: 5.0
ema_decay: 0.999

loss:
  pixel:
    type: L1
    weight: 1.0

val_freq: 1000
vis_freq: 5000
save_freq: 5000
print_freq: 100
n_vis: 4
vis_bands: [10, 6, 2]

wandb:
  project: EMIT-S2-SuperResolution
  entity: null

abort_on_nan: true
abort_psnr_floor: 25.0
