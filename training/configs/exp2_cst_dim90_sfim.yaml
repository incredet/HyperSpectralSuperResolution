# Exp 2 — GT source comparison: CST dim=90 trained on SFIM GT
# Direct counterpart to exp1_cst_dim90 (CNMF GT). Same architecture, same hyperparams,
# only the GT source differs. Demonstrates the Wald-predicted quality gap empirically.
# Requires zips_sfim_patched to exist on /content/data/.
exp_name: exp2-cst-dim90-sfim
model_type: cst
gt_source: sfim
zip_dir: /content/data/zips_sfim_patched
zip_dir_full: /content/data/zips_sfim_npy
out_dir: /content/drive/Shareddrives/HyperResData/EMIT_S-2_Matches/experiments

seed: 42
num_bands: 32
scale: 6
gt_size: 192
batch_size: 48
num_workers: 8
max_aois: null
amp: false

dim: 90
depths: [6, 6, 6, 6, 6, 6]
num_heads: [6, 6, 6, 6, 6, 6]
mlp_ratio: 2
drop_path_rate: 0.1

lr: 0.0001
betas: [0.9, 0.99]
milestones: [15_000, 30_000, 45_000, 60_000, 75_000]
gamma: 0.5
total_iter: 100_000
grad_clip: 5.0
ema_decay: 0.999

loss:
  pixel:
    type: L1
    weight: 1.0

val_freq: 2500
vis_freq: 5000
save_freq: 5000
print_freq: 100
n_vis: 4
vis_bands: [10, 6, 2]

wandb:
  project: EMIT-S2-SuperResolution
  entity: null

abort_on_nan: true
abort_psnr_floor: 25.0
