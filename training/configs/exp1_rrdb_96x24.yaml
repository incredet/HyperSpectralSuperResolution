# Exp 1 — Architecture comparison: RRDBNet6x 96f/24b (~16M params)
# Capacity-matched to the transformer variants.
# LR 2e-4 per ESRGAN (Wang et al. 2018)
exp_name: exp1-rrdb-96x24
model_type: rrdbnet6x
gt_source: cnmf
zip_dir: /content/data/zips_cnmf_patched
zip_dir_full: /content/data/zips_cnmf_npy
out_dir: /content/drive/Shareddrives/HyperResData/EMIT_S-2_Matches/experiments
split_json: /content/drive/Shareddrives/HyperResData/EMIT_S-2_Matches/2026-04-02/aoi_split.json

seed: 42
num_bands: 32
scale: 6
gt_size: 192
batch_size: 96
num_workers: 12
max_aois: null
amp: false

num_feat: 96
num_block: 24
num_grow_ch: 32
channel_attention: false

lr: 0.0002
betas: [0.9, 0.99]
milestones: [15_000, 30_000, 45_000, 60_000, 75_000]
gamma: 0.5
total_iter: 100_000
grad_clip: 5.0
ema_decay: 0.999

loss:
  pixel:
    type: L1
    weight: 1.0

val_freq: 2500
vis_freq: 5000
save_freq: 5000
print_freq: 100
n_vis: 4
vis_bands: [10, 6, 2]

wandb:
  project: EMIT-S2-SuperResolution
  entity: null

abort_on_nan: true
abort_psnr_floor: 25.0
