# Exp 3 — Synthetic vs Real: CST dim=90 trained on synthetic-degraded EMIT only.
# Input: degraded EMIT (Gaussian blur sigma ≈ 2.55 + decimate 96x96 -> 16x16).
# GT:    real 96x96 EMIT.
# This is the Wald-style single-sensor baseline — the realistic alternative when no
# high-resolution cross-sensor data is available. Comparison: exp1_cst_dim90 (CNMF GT,
# same architecture) should recover real 10m spatial detail; this run can only recover
# spatial frequencies within EMIT's native 60m sampling.
# Requires synthetic zips produced by training/make_synthetic.py.
exp_name: exp3-cst-dim90-synthetic
model_type: cst
gt_source: synthetic
zip_dir: /content/data/zips_cnmf_synthetic
zip_dir_full: /content/data/zips_cnmf_synthetic
out_dir: /content/drive/Shareddrives/HyperResData/EMIT_S-2_Matches/experiments

seed: 42
num_bands: 32
scale: 6
gt_size: 96
batch_size: 48
num_workers: 8
max_aois: null
amp: false

dim: 90
depths: [6, 6, 6, 6, 6, 6]
num_heads: [6, 6, 6, 6, 6, 6]
mlp_ratio: 2
drop_path_rate: 0.1

lr: 0.0001
betas: [0.9, 0.99]
milestones: [20_000, 35_000, 50_000]
gamma: 0.5
total_iter: 60_000
grad_clip: 5.0
ema_decay: 0.999

loss:
  pixel:
    type: L1
    weight: 1.0

val_freq: 2500
vis_freq: 5000
save_freq: 5000
print_freq: 100
n_vis: 4
vis_bands: [10, 6, 2]

wandb:
  project: EMIT-S2-SuperResolution
  entity: null

abort_on_nan: true
abort_psnr_floor: 25.0
